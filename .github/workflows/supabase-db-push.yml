name: Supabase DB Push

on:
  workflow_dispatch:
    inputs:
      organization_id:
        description: "Org id requesting migration apply"
        required: false
      approval_id:
        description: "Approval id in AiWorkers"
        required: false
      requested_by_user_id:
        description: "User id requesting migration apply"
        required: false

jobs:
  db_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Supabase CLI
        run: npm i -g supabase

      - name: Supabase link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations (db push)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push

